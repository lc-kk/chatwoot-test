<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatwoot Widget 测试页</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
    }

    .tips {
      margin-top: 16px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.65);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Chatwoot Widget 测试页</h1>
      <p>这个页面只用于测试真实 Chatwoot Widget 链路。</p>
      <p>请在右下角打开聊天窗口，发送消息后观察 Chatwoot 与后端 webhook 流程。</p>
      <div class="tips">
        用途：验证 Chatwoot Widget → Chatwoot → webhook → backend → AI reply 整条链路
      </div>
    </div>
  </div>

  <script>
    window.chatwootSettings = {
      position: "right",
      locale: "zh_CN",
      type: "standard"
    };

    (function(d, t) {
      var BASE_URL = "https://chatwoot-production-5002.up.railway.app";
      var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
      g.src = BASE_URL + "/packs/js/sdk.js";
      g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function() {
        window.chatwootSDK.run({
          websiteToken: "D4oVDNsmy4pRjut1uMFqpvac",
          baseUrl: BASE_URL
        });
      };
    })(document, "script");

    window.addEventListener("chatwoot:ready", function () {
      if (window.$chatwoot) {
        window.$chatwoot.toggle("open");
      }
    });

    window.addEventListener("chatwoot:on-message", function () {
      if (window.$chatwoot && !window.$chatwoot.isOpen) {
        window.$chatwoot.toggle("open");
      }
    });
  </script>
</body>
</html>
