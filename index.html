<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatwoot 测试页</title>
  <style>
    :root{
      --bg1:#0b1220; --bg2:#0f172a;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1100px 700px at 20% 10%, rgba(99,102,241,.35), transparent 55%),
        radial-gradient(900px 600px at 80% 15%, rgba(16,185,129,.22), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .wrap{max-width:920px; margin:0 auto; padding:28px 16px 120px;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px 18px;
    }
    h1{margin:6px 0 8px; font-size:26px; letter-spacing:.2px}
    p{margin:6px 0; color:var(--muted); line-height:1.6}
    .hint{
      position:fixed; right:16px; bottom:92px; z-index:9999;
      display:none; align-items:center; gap:10px; pointer-events:none;
    }
    .hint .msg{
      padding:10px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.35);
      color:rgba(255,255,255,.92);
      font-size:13px;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
      max-width:70vw;
    }
    .hint .arrow{
      width:46px; height:46px; border-radius:999px;
      display:grid; place-items:center;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.30);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
      animation:bounce 1.3s ease-in-out infinite;
    }
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Chatwoot 客户模拟测试</h1>
      <p>进入页面后右下角聊天窗口会自动打开，直接发送消息即可。</p>
      <p>如未自动打开，请点击右下角聊天气泡。</p>
    </div>
  </div>

  <div class="hint" id="hint">
    <div class="msg">聊天气泡在这里 👉（点右下角）</div>
    <div class="arrow" aria-hidden="true">↘</div>
  </div>

  <script>
    // Chatwoot 配置
    window.chatwootSettings = {
      position: "right",
      type: "standard",
      launcherTitle: ""
      // 你也可以在这里加 locale: "zh"
    };

    (function(d,t) {
      var BASE_URL="https://app.chatwoot.com";
      var g=d.createElement(t), s=d.getElementsByTagName(t)[0];
      g.src=BASE_URL+"/packs/js/sdk.js";
      g.async = true;
      s.parentNode.insertBefore(g,s);

      g.onload=function(){
        window.chatwootSDK.run({
          websiteToken: "jU11bNeUjdHZzpTSbHqN7feq",
          baseUrl: BASE_URL
        });

        // 等 SDK 初始化后再打开（做一个小延迟更稳）
        setTimeout(function(){
          try {
            if (window.$chatwoot && typeof window.$chatwoot.toggle === "function") {
              // 有些版本支持 toggle('open')，不支持就用 toggle()
              try { window.$chatwoot.toggle("open"); }
              catch(_) { window.$chatwoot.toggle(); }
            } else {
              // 兜底提示：展示“右下角气泡”
              var hint = document.getElementById("hint");
              hint.style.display = "flex";
              setTimeout(()=>hint.style.display="none", 6500);
            }
          } catch(e) {}
        }, 350);
      }
    })(document,"script");
  </script>
</body>
</html>
