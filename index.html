<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatwoot 居中测试页</title>
  <style>
    :root{
      --bg1:#0b1220; --bg2:#0f172a;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1100px 700px at 20% 10%, rgba(99,102,241,.35), transparent 55%),
        radial-gradient(900px 600px at 80% 15%, rgba(16,185,129,.22), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .wrap{max-width:920px; margin:0 auto; padding:28px 16px 32px;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px 18px;
      margin-bottom:16px;
    }
    h1{margin:6px 0 6px; font-size:22px}
    p{margin:0; color:var(--muted); line-height:1.6; font-size:14px}

    /* ✅ 关键：把 Chatwoot widget 强行变成“居中卡片” */
    #chatwoot_live_chat_widget{
      position: fixed !important;
      left: 50% !important;
      top: 50% !important;
      right: auto !important;
      bottom: auto !important;
      transform: translate(-50%, -50%) !important;
      z-index: 999999 !important;
    }
    /* Chatwoot iframe 尺寸变成卡片大小 */
    #chatwoot_live_chat_widget iframe{
      width: min(420px, 92vw) !important;
      height: min(640px, 78vh) !important;
      border-radius: 18px !important;
      overflow: hidden !important;
      box-shadow: var(--shadow) !important;
    }

    /* 有些版本外层会额外包一层 div，也一起兜底 */
    #chatwoot_live_chat_widget > div{
      width: auto !important;
      height: auto !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Chatwoot 客户模拟测试</h1>
      <p>页面加载后将自动打开聊天窗口（居中显示）。直接发送消息即可。</p>
    </div>
  </div>

  <script>
    // Chatwoot 配置（隐藏右下角气泡，避免“还在角落有个按钮”）
    window.chatwootSettings = {
      type: "standard",
      position: "right",
      launcherTitle: "",
      hideMessageBubble: true
    };

    (function(d,t) {
      var BASE_URL = "https://app.chatwoot.com";
      var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
      g.src = BASE_URL + "/packs/js/sdk.js";
      g.async = true;
      s.parentNode.insertBefore(g,s);

      g.onload = function() {
        window.chatwootSDK.run({
          websiteToken: "jU11bNeUjdHZzpTSbHqN7feq",
          baseUrl: BASE_URL
        });

        // 打开聊天窗口
        setTimeout(function(){
          try{
            if (window.$chatwoot && typeof window.$chatwoot.toggle === "function") {
              try { window.$chatwoot.toggle("open"); }
              catch(_) { window.$chatwoot.toggle(); }
            }
          } catch(e) {}
        }, 350);
      };
    })(document,"script");
  </script>
</body>
</html>
