<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal AI Test Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Internal AI Test Chat</h1>
      <div class="meta">
        <span id="conversationLabel">Conversation ID: -</span>
        <button id="newChatBtn">New Chat</button>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="composer">
      <textarea
        id="messageInput"
        placeholder="Type a test message..."
        rows="3"
      ></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
